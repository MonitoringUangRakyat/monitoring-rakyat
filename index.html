<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=dashboard/">
  <title>Monitoring Rakyat - Dashboard Publik</title>
  <link rel="canonical" href="dashboard/">
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #080b12;
      color: #f8fafc;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 680px;
      width: 100%;
      border: 1px solid #2e3248;
      border-radius: 8px;
      padding: 28px;
      background: #0f1117;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      color: #f59e0b;
    }
    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.55;
    }
    a {
      display: inline-block;
      color: #080b12;
      background: #f59e0b;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Monitoring Rakyat</h1>
    <p>Anda sedang diarahkan ke dashboard publik.</p>
    <a href="dashboard/">Buka Dashboard Publik</a>
  </main>
</body>
</html>
