name: AI Agent Readiness Patrol

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Gudang DB readiness
        run: |
          python scripts/generate_ai_index.py
          python scripts/validate_gudang_db.py
          python scripts/validate_immutable_db.py
          python scripts/build_dashboard_summary.py
          python scripts/build_fiscal_ratio_summary.py
          python scripts/import_nemesis_procurement.py
          python scripts/pre_github_readiness.py --write
          python scripts/build_source_patrol.py
          python scripts/ai_pengawas_orchestrator.py

      - name: Commit readiness updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ai-agent): update readiness patrol"
          file_pattern: "dashboard/dashboard_summary.json dashboard/fiscal_ratio_annual.json dashboard/nemesis_integration_status.json dashboard/pre_github_readiness.json dashboard/ai_agent_tasks.json dashboard/ai_agent_source_patrol.json dashboard/ai_orchestrator_status.json docs/PRE_GITHUB_READINESS_REPORT.md docs/AI_ORCHESTRATOR_24_7_REPORT.md gudang-db/_index/ai_index.json gudang-db/_queue/ai_pengawas_candidates.json gudang-db/_queue/ai_pengawas_candidates.csv gudang-db/_queue/nemesis_procurement_candidates.json gudang-db/_queue/nemesis_procurement_candidates.csv"
